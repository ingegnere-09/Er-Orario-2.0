<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-M12YF4T24Z"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-M12YF4T24Z');
</script>
<div class="log">
  <h2>Login / Register</h2>
  <input class="input-field" id="user" placeholder="Username">
  <input class="input-field" id="pass" type="password" placeholder="Password">
</div>
<div class="butt">
  <button class="btn1" onclick="login()">Login</button>
  <button class="btn2" onclick="register()">Register</button>
</div>
<p class="back-link"><a href="../index2.html">←Back to home</a></p>
<hr class="linea">
<div class="Classifica">
  <h3>🏆 Classifica</h3>
  <ul id="leaderboard"></ul>
</div>

<script>
const userInput = document.getElementById("user");
const passInput = document.getElementById("pass");
const leaderboard = document.getElementById("leaderboard");

async function login() {
  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username: userInput.value, password: passInput.value })
  });
  const data = await res.json();
  if (data.success) {
    localStorage.setItem("user", JSON.stringify(data.user));
    window.location = "/game.html";
  } else alert("Errore login");
}

async function register() {
  const res = await fetch("/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username: userInput.value, password: passInput.value })
  });
  const data = await res.json();
  alert(data.success ? "Registrato!" : data.message);
}

async function loadLeaderboard() {
  const res = await fetch("/leaderboard");
  const data = await res.json();
  leaderboard.innerHTML = "";
  data.forEach(u => {
    const li = document.createElement("li");
    li.textContent = `${u.username} - Livello ${u.level}`;
    leaderboard.appendChild(li);
  });
}

loadLeaderboard();
</script>

</body>
</html>
